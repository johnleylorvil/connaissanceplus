<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#0D1B2A"/>

  <!-- Open book - left page -->
  <path d="M10 82 Q30 72 50 74 L50 90 Q30 88 10 90 Z" fill="#C9A227"/>
  <!-- Open book - right page -->
  <path d="M90 82 Q70 72 50 74 L50 90 Q70 88 90 90 Z" fill="#B8911F"/>
  <!-- Book spine shadow -->
  <line x1="50" y1="74" x2="50" y2="90" stroke="#0D1B2A" stroke-width="2"/>

  <!-- Person silhouette (white) -->
  <!-- Head -->
  <circle cx="44" cy="26" r="7" fill="#F5EFE0"/>
  <!-- Body -->
  <path d="M38 34 Q44 31 50 34 L52 60 L36 60 Z" fill="#F5EFE0"/>
  <!-- Left arm stretched back/down for balance -->
  <line x1="39" y1="42" x2="22" y2="56" stroke="#F5EFE0" stroke-width="5" stroke-linecap="round"/>
  <!-- Right arm reaching up toward star -->
  <line x1="50" y1="37" x2="68" y2="18" stroke="#F5EFE0" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="40" y1="60" x2="36" y2="74" stroke="#F5EFE0" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="46" y1="60" x2="49" y2="74" stroke="#F5EFE0" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Gold star (5-pointed) at top right -->
  <polygon points="74,8 76.7,15.6 84.8,15.6 78.5,20.3 81.2,27.9 74,23.2 66.8,27.9 69.5,20.3 63.2,15.6 71.3,15.6" fill="#C9A227"/>
</svg>
