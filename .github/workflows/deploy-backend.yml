name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'deploy/ec2/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      EC2_DEPLOY_DIR: ${{ vars.EC2_DEPLOY_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" ./backend
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure deploy directory exists on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            mkdir -p "${{ env.EC2_DEPLOY_DIR }}"
            mkdir -p "${{ env.EC2_DEPLOY_DIR }}/uploads"
            mkdir -p "${{ env.EC2_DEPLOY_DIR }}/hls_output"

      - name: Upload EC2 runtime files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: deploy/ec2/docker-compose.yml,deploy/ec2/livekit-egress.yaml
          target: ${{ env.EC2_DEPLOY_DIR }}
          strip_components: 2

      - name: Deploy backend on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          envs: AWS_REGION,EC2_DEPLOY_DIR,ECR_REGISTRY,IMAGE_URI
          script: |
            cd "$EC2_DEPLOY_DIR"
            test -f .env || { echo "Missing $EC2_DEPLOY_DIR/.env on EC2"; exit 1; }

            cat > .deploy.env <<EOF
            BACKEND_IMAGE=$IMAGE_URI
            EOF

            if ! grep -E '^(LIVEKIT_API_KEY|LIVEKIT_API_SECRET)=' .env >> .deploy.env; then
              echo "LIVEKIT_API_KEY / LIVEKIT_API_SECRET not found in .env; continuing without LiveKit interpolation overrides."
            fi

            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker compose --env-file .deploy.env -f docker-compose.yml pull
            docker compose --env-file .deploy.env -f docker-compose.yml up -d --remove-orphans
            docker image prune -f

      - name: Verify backend health on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          envs: EC2_DEPLOY_DIR
          script: |
            cd "$EC2_DEPLOY_DIR"
            for attempt in $(seq 1 12); do
              docker compose --env-file .deploy.env -f docker-compose.yml ps

              if curl --fail --silent http://127.0.0.1:3000/health; then
                exit 0
              fi

              echo "Backend health check attempt $attempt failed; waiting 5s..."
              sleep 5
            done

            docker compose --env-file .deploy.env -f docker-compose.yml logs --tail=200
            exit 1
