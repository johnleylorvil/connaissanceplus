name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'deploy/aws/backend-ecs-task-definition.template.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      TASK_DEFINITION_PATH: deploy/aws/backend-ecs-task-definition.template.json
      FRONTEND_URL: ${{ vars.FRONTEND_URL }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_SYNCHRONIZE: ${{ vars.DB_SYNCHRONIZE }}
      DB_MIGRATIONS_RUN: ${{ vars.DB_MIGRATIONS_RUN }}
      REDIS_HOST: ${{ vars.REDIS_HOST }}
      SPONSOR_UPLOADS_S3_BUCKET: ${{ vars.SPONSOR_UPLOADS_S3_BUCKET }}
      SPONSOR_UPLOADS_PUBLIC_BASE_URL: ${{ vars.SPONSOR_UPLOADS_PUBLIC_BASE_URL }}
      LIVEKIT_URL: ${{ vars.LIVEKIT_URL }}
      HLS_BASE_URL: ${{ vars.HLS_BASE_URL }}
      LIVEKIT_EGRESS_S3_BUCKET: ${{ vars.LIVEKIT_EGRESS_S3_BUCKET }}
      LIVEKIT_EGRESS_S3_REGION: ${{ vars.LIVEKIT_EGRESS_S3_REGION }}
      LIVEKIT_EGRESS_S3_ENDPOINT: ${{ vars.LIVEKIT_EGRESS_S3_ENDPOINT }}
      LIVEKIT_EGRESS_S3_FORCE_PATH_STYLE: ${{ vars.LIVEKIT_EGRESS_S3_FORCE_PATH_STYLE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" ./backend
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Inject runtime variables into ECS task definition
        shell: pwsh
        run: |
          $taskDefinitionPath = "${{ env.TASK_DEFINITION_PATH }}"
          $taskDefinition = Get-Content $taskDefinitionPath -Raw | ConvertFrom-Json
          $container = $taskDefinition.containerDefinitions | Where-Object { $_.name -eq 'backend' } | Select-Object -First 1

          if (-not $container) {
            throw 'Backend container definition not found in task definition template.'
          }

          $requiredValues = @{
            FRONTEND_URL = '${{ env.FRONTEND_URL }}'
            CORS_ORIGINS = '${{ env.CORS_ORIGINS }}'
            DB_HOST = '${{ env.DB_HOST }}'
            DB_PORT = '${{ env.DB_PORT }}'
            DB_NAME = '${{ env.DB_NAME }}'
            DB_SYNCHRONIZE = '${{ env.DB_SYNCHRONIZE }}'
            DB_MIGRATIONS_RUN = '${{ env.DB_MIGRATIONS_RUN }}'
            SPONSOR_UPLOADS_S3_BUCKET = '${{ env.SPONSOR_UPLOADS_S3_BUCKET }}'
            SPONSOR_UPLOADS_PUBLIC_BASE_URL = '${{ env.SPONSOR_UPLOADS_PUBLIC_BASE_URL }}'
          }

          $optionalValues = @{
            REDIS_HOST = '${{ env.REDIS_HOST }}'
            LIVEKIT_URL = '${{ env.LIVEKIT_URL }}'
            HLS_BASE_URL = '${{ env.HLS_BASE_URL }}'
            LIVEKIT_EGRESS_S3_BUCKET = '${{ env.LIVEKIT_EGRESS_S3_BUCKET }}'
            LIVEKIT_EGRESS_S3_REGION = '${{ env.LIVEKIT_EGRESS_S3_REGION }}'
            LIVEKIT_EGRESS_S3_ENDPOINT = '${{ env.LIVEKIT_EGRESS_S3_ENDPOINT }}'
            LIVEKIT_EGRESS_S3_FORCE_PATH_STYLE = '${{ env.LIVEKIT_EGRESS_S3_FORCE_PATH_STYLE }}'
          }

          foreach ($environmentEntry in $container.environment) {
            if ($requiredValues.ContainsKey($environmentEntry.name)) {
              $environmentEntry.value = $requiredValues[$environmentEntry.name]
            }
          }

          $container.environment = @(
            foreach ($environmentEntry in $container.environment) {
              if (-not $optionalValues.ContainsKey($environmentEntry.name)) {
                $environmentEntry
                continue
              }

              $value = $optionalValues[$environmentEntry.name]
              if ([string]::IsNullOrWhiteSpace($value)) {
                continue
              }

              $environmentEntry.value = $value
              $environmentEntry
            }
          )

          $taskDefinition | ConvertTo-Json -Depth 100 | Set-Content -Path $taskDefinitionPath

      - name: Render ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION_PATH }}
          container-name: backend
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
