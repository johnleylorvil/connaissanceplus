name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'deploy/aws/backend-ecs-task-definition.template.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      TASK_DEFINITION_PATH: deploy/aws/backend-ecs-task-definition.template.json
      FRONTEND_URL: ${{ vars.FRONTEND_URL }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_NAME: ${{ vars.DB_NAME }}
      REDIS_HOST: ${{ vars.REDIS_HOST }}
      SPONSOR_UPLOADS_S3_BUCKET: ${{ vars.SPONSOR_UPLOADS_S3_BUCKET }}
      SPONSOR_UPLOADS_PUBLIC_BASE_URL: ${{ vars.SPONSOR_UPLOADS_PUBLIC_BASE_URL }}
      LIVEKIT_URL: ${{ vars.LIVEKIT_URL }}
      HLS_BASE_URL: ${{ vars.HLS_BASE_URL }}
      LIVEKIT_EGRESS_S3_BUCKET: ${{ vars.LIVEKIT_EGRESS_S3_BUCKET }}
      LIVEKIT_EGRESS_S3_REGION: ${{ vars.LIVEKIT_EGRESS_S3_REGION }}
      LIVEKIT_EGRESS_S3_ENDPOINT: ${{ vars.LIVEKIT_EGRESS_S3_ENDPOINT }}
      LIVEKIT_EGRESS_S3_FORCE_PATH_STYLE: ${{ vars.LIVEKIT_EGRESS_S3_FORCE_PATH_STYLE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" ./backend
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Inject runtime variables into ECS task definition
        run: |
          $content = Get-Content "${{ env.TASK_DEFINITION_PATH }}" -Raw
          $replacements = @{
            '__FRONTEND_URL__' = '${{ env.FRONTEND_URL }}'
            '__CORS_ORIGINS__' = '${{ env.CORS_ORIGINS }}'
            '__DB_HOST__' = '${{ env.DB_HOST }}'
            '__DB_NAME__' = '${{ env.DB_NAME }}'
            '__REDIS_HOST__' = '${{ env.REDIS_HOST }}'
            '__SPONSOR_UPLOADS_S3_BUCKET__' = '${{ env.SPONSOR_UPLOADS_S3_BUCKET }}'
            '__SPONSOR_UPLOADS_PUBLIC_BASE_URL__' = '${{ env.SPONSOR_UPLOADS_PUBLIC_BASE_URL }}'
            '__LIVEKIT_URL__' = '${{ env.LIVEKIT_URL }}'
            '__HLS_BASE_URL__' = '${{ env.HLS_BASE_URL }}'
            '__LIVEKIT_EGRESS_S3_BUCKET__' = '${{ env.LIVEKIT_EGRESS_S3_BUCKET }}'
            '__LIVEKIT_EGRESS_S3_REGION__' = '${{ env.LIVEKIT_EGRESS_S3_REGION }}'
            '__LIVEKIT_EGRESS_S3_ENDPOINT__' = '${{ env.LIVEKIT_EGRESS_S3_ENDPOINT }}'
            '__LIVEKIT_EGRESS_S3_FORCE_PATH_STYLE__' = '${{ env.LIVEKIT_EGRESS_S3_FORCE_PATH_STYLE }}'
          }

          foreach ($entry in $replacements.GetEnumerator()) {
            $content = $content.Replace($entry.Key, $entry.Value)
          }

          Set-Content -Path "${{ env.TASK_DEFINITION_PATH }}" -Value $content

      - name: Render ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION_PATH }}
          container-name: backend
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
